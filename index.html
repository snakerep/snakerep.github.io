<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S N A K E</title>
    <style>
        body {
            background: radial-gradient(circle at center, #0a1128 0%, #00040a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: none;
            position: relative;
        }
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: linear-gradient(#111 1px, transparent 1px), linear-gradient(90deg, #111 1px, transparent 1px);
            background-size: 20px 20px;
            background-position: center;
            opacity: 0.15;
            z-index: 1;
        }
        #gameCanvas {
            position: relative;
            z-index: 10;
            border: 1px solid rgba(0, 255, 255, 0.05);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(0, 255, 255, 0.02);
            border-radius: 8px;
            cursor: pointer;
        }
        #respring {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            perspective: 1px;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="respring"></div>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const respringContainer = document.getElementById("respring");
        const size = Math.min(window.innerWidth * 0.85, 420);
        canvas.width = size;
        canvas.height = size;
        const tileCount = 20;
        const gridSize = size / tileCount;
        let snake = [{x: 10, y: 10}, {x: 10, y: 11}, {x: 10, y: 12}, {x: 10, y: 13}];
        let food = {x: 5, y: 5};
        let dx = 0, dy = -1;
        let gameRunning = false;
        let pulse = 0;
        let pDir = 1;
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            pulse += 0.05 * pDir;
            if (pulse > 1 || pulse < 0) pDir *= -1;
            ctx.shadowBlur = 0;
            ctx.strokeStyle = "rgba(0, 255, 255, 0.03)";
            ctx.lineWidth = 0.5;
            for(let i=1; i<tileCount; i++) {
                ctx.beginPath(); ctx.moveTo(i*gridSize, 0); ctx.lineTo(i*gridSize, size); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i*gridSize); ctx.lineTo(size, i*gridSize); ctx.stroke();
            }
            ctx.shadowColor = `rgba(255, 20, 147, ${0.4 + pulse * 0.4})`;
            ctx.shadowBlur = 15 + pulse * 10;
            ctx.fillStyle = "#ff1493";
            ctx.beginPath();
            ctx.arc(food.x * gridSize + gridSize/2, food.y * gridSize + gridSize/2, gridSize/2.8 + pulse*1.5, 0, Math.PI*2);
            ctx.fill();
            snake.forEach((seg, index) => {
                const ratio = index / snake.length;
                const r = 0 + ratio * 30;
                const g = 255 - ratio * 150;
                const b = 255 - ratio * 50;
                const color = `rgb(${r}, ${g}, ${b})`;
                ctx.shadowColor = color;
                ctx.shadowBlur = index === 0 ? 20 : 10;
                ctx.fillStyle = color;
                const s = index === 0 ? 0 : 1;
                ctx.fillRect(seg.x * gridSize + s, seg.y * gridSize + s, gridSize - s*2, gridSize - s*2);
            });
            if (!gameRunning) {
                ctx.shadowBlur = 0;
                ctx.fillStyle = "rgba(0,0,0,0.5)";
                ctx.fillRect(0,0,size,size);
            }
        }
        function update() {
            if (!gameRunning) return;
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount || 
                snake.some(seg => seg.x === head.x && seg.y === head.y)) {
                die();
                return;
            }
            snake.unshift(head);
            if (head.x === food.x && head.y === food.y) {
                food = { x: Math.floor(Math.random()*tileCount), y: Math.floor(Math.random()*tileCount) };
            } else {
                snake.pop();
            }
        }
        function gameLoop() {
            update();
            draw();
            if (gameRunning) setTimeout(gameLoop, 110);
        }
        function die() {
            gameRunning = false;
            respringContainer.style.display = 'block';
            for (let i = 0; i < 700; i++) {
                const d = document.createElement('div');
                d.style.cssText = `position:fixed;width:100vw;height:100vh;backdrop-filter:blur(180px);-webkit-backdrop-filter:blur(180px);opacity:0.95;transform:translate3d(${i}px,${i}px,${i}px);z-index:${9999+i};`;
                respringContainer.appendChild(d);
            }
            setInterval(() => {
                window.history.pushState(null, "", window.location.href);
            }, 1);
        }
        canvas.addEventListener('click', () => {
            if (!gameRunning) {
                gameRunning = true;
                gameLoop();
            }
        });
        let tsX, tsY;
        document.addEventListener('touchstart', e => { tsX = e.touches[0].clientX; tsY = e.touches[0].clientY; }, false);
        document.addEventListener('touchmove', e => {
            if (!tsX || !tsY) return;
            let teX = e.touches[0].clientX, teY = e.touches[0].clientY;
            let xd = tsX - teX, yd = tsY - teY;
            if (Math.abs(xd) > Math.abs(yd)) {
                if (xd > 0 && dx === 0) { dx = -1; dy = 0; } else if (xd < 0 && dx === 0) { dx = 1; dy = 0; }
            } else {
                if (yd > 0 && dy === 0) { dx = 0; dy = -1; } else if (yd < 0 && dy === 0) { dx = 0; dy = 1; }
            }
            tsX = null; tsY = null;
        }, false);
        setInterval(draw, 50);
    </script>
</body>
</html>
